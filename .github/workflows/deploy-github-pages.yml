name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: contract-clear/package-lock.json

      - name: Build static marketing site
        working-directory: contract-clear
        env:
          GITHUB_PAGES: "true"
          GITHUB_PAGES_BASE_PATH: /Pinnacle-Contract-Analyzer
          NEXT_PUBLIC_APP_URL: https://pinnacle-contract-analyzer.vercel.app
        run: npm ci && npm run build:gh-pages

      - uses: actions/upload-pages-artifact@v3
        with:
          path: contract-clear/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
