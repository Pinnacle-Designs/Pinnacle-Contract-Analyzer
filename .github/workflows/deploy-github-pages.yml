name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: contract-clear/package-lock.json

      - name: Build static marketing site
        working-directory: contract-clear
        env:
          GITHUB_PAGES: "true"
          GITHUB_PAGES_BASE_PATH: ""
          NEXT_PUBLIC_BASE_PATH: ""
          NEXT_PUBLIC_SITE_URL: https://pinnaclecontractanalyzer.com
          NEXT_PUBLIC_APP_URL: https://pinnacle-contract-analyzer.vercel.app
        run: npm ci && npm run build:gh-pages

      - name: Verify build output
        run: |
          test -f contract-clear/out/index.html
          test -f contract-clear/out/CNAME
          test -f contract-clear/out/.nojekyll
          test -f contract-clear/out/sitemap.xml
          echo "Build OK — $(wc -c < contract-clear/out/index.html) byte index.html"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: contract-clear/out
          publish_branch: gh-pages
          force_orphan: true
