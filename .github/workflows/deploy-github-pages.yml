name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: contract-clear/package-lock.json

      - name: Build static marketing site
        working-directory: contract-clear
        env:
          GITHUB_PAGES: "true"
          GITHUB_PAGES_BASE_PATH: ""
          NEXT_PUBLIC_BASE_PATH: ""
          NEXT_PUBLIC_SITE_URL: https://pinnaclecontractanalyzer.com
          NEXT_PUBLIC_APP_URL: https://pinnacle-contract-analyzer.vercel.app
          SITEMAP_LAST_MODIFIED: ${{ github.event.repository.updated_at }}
        run: npm ci && npm run sitemap && npm run build:gh-pages

      - name: Verify build output
        run: |
          test -f contract-clear/out/index.html
          test -f contract-clear/out/CNAME
          test -f contract-clear/out/.nojekyll
          test -f contract-clear/out/sitemap.xml
          test -f contract-clear/out/robots.txt
          echo "index.html size: $(wc -c < contract-clear/out/index.html) bytes"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: contract-clear/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
